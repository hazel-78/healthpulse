<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HealthPulse — Doctor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#00d4aa;--accent-dim:#00b891;--accent-glow:rgba(0,212,170,0.18);
  --warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --bg:#0b1623;--bg2:#111f30;--bg3:#162438;
  --card:#1a2d44;--card2:#1f3452;
  --text:#eef2f7;--text2:#8fa8c0;--text3:#4e6a82;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --nav-w:248px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400;}
.app{display:flex;min-height:100vh;}

/* SIDENAV */
.sidenav{width:var(--nav-w);background:linear-gradient(180deg,#071524 0%,#0a1e33 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.3s;}
.sidenav-logo{display:flex;align-items:center;gap:9px;font-family:'DM Serif Display',serif;font-size:1.3rem;color:white;padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--border);}
.sidenav-logo .hp{color:var(--accent);}
.pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow);}50%{box-shadow:0 0 0 5px transparent;}}
.nav-section{padding:1rem 0.75rem 0.5rem;}
.nav-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:0 0.6rem;margin-bottom:0.4rem;}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.62rem 0.8rem;border-radius:var(--radius-xs);color:var(--text2);font-size:0.875rem;cursor:pointer;transition:all 0.18s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-item.active{background:rgba(0,212,170,0.1);color:var(--accent);border:1px solid rgba(0,212,170,0.15);}
.nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.sidenav-foot{margin-top:auto;padding:1rem 0.75rem 1.5rem;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.8rem;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a5299,#0d3366);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:600;color:#aac4f0;flex-shrink:0;}
.user-name{font-size:0.82rem;font-weight:500;color:var(--text);}
.user-role{font-size:0.7rem;color:var(--text3);}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:4px;transition:color 0.2s;}
.logout-btn:hover{color:var(--danger);}

/* MAIN */
.main{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.topbar-left h2{font-family:'DM Serif Display',serif;font-size:1.45rem;color:var(--text);font-weight:400;}
.topbar-left p{font-size:0.8rem;color:var(--text3);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:0.75rem;}
.role-badge{display:flex;align-items:center;gap:0.5rem;background:rgba(26,82,153,0.15);border:1px solid rgba(26,82,153,0.3);border-radius:20px;padding:0.35rem 0.85rem;font-size:0.78rem;color:#74b5f5;}
.page-content{padding:2rem;flex:1;}

/* PATIENT TABS */
.patient-tabs-bar{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.patient-tabs-bar h3{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);white-space:nowrap;font-weight:400;}
.patient-tabs{display:flex;gap:0.4rem;flex-wrap:wrap;flex:1;}
.p-tab{display:flex;align-items:center;gap:0.5rem;padding:0.42rem 0.9rem;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:0.82rem;color:var(--text2);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.p-tab.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.3);color:var(--accent);}
.p-tab:hover:not(.active){border-color:var(--border2);color:var(--text);}
.p-tab-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;flex-shrink:0;}

/* LINK PATIENT */
.link-bar{display:flex;gap:0.75rem;align-items:center;margin-bottom:1.5rem;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:1rem 1.25rem;}
.link-bar input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:0.6rem 0.9rem;outline:none;transition:border-color 0.2s;}
.link-bar input:focus{border-color:var(--accent);}
.link-bar input::placeholder{color:var(--text3);}
.link-bar label{font-size:0.8rem;color:var(--text2);white-space:nowrap;}
.link-msg{font-size:0.78rem;}

/* PATIENT PROFILE CARD */
.patient-profile{background:linear-gradient(135deg,#0d2e4a,#071829);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem 2rem;margin-bottom:1.5rem;}
.pp-grid{display:grid;grid-template-columns:1fr auto;gap:1.5rem;align-items:center;}
.pp-name{font-family:'DM Serif Display',serif;font-size:1.7rem;color:white;}
.pp-meta{font-size:0.83rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.3rem;}
.pp-tag{background:rgba(26,82,153,0.2);border:1px solid rgba(26,82,153,0.35);border-radius:20px;padding:0.2rem 0.65rem;font-size:0.72rem;color:#74b5f5;}
.pp-day{font-family:'DM Serif Display',serif;font-size:2rem;color:white;line-height:1;}
.pp-day-label{font-size:0.72rem;color:var(--text3);}
.empty-state{text-align:center;padding:3rem;color:var(--text3);font-size:0.9rem;}
.empty-state .es-icon{font-size:3rem;margin-bottom:1rem;}

/* VITALS INPUT */
.log-section{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.log-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);font-weight:400;}
.log-sub{font-size:0.78rem;color:var(--text3);margin-top:2px;}
.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
.vi-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:1rem;}
.vi-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.35rem;}
.vi-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-xs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:500;padding:0.55rem 0.75rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.vi-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1);}
.vi-input::placeholder{color:var(--text3);font-size:0.83rem;font-weight:400;}
.vi-unit{font-size:0.68rem;color:var(--text3);margin-top:0.3rem;}
.vi-ref{font-size:0.66rem;color:var(--text3);margin-top:0.1rem;}
.vi-status{display:inline-flex;font-size:0.64rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:1px 6px;border-radius:6px;margin-top:0.4rem;}
.vs-normal{background:rgba(0,212,170,0.1);color:var(--accent);}
.vs-warn{background:rgba(245,158,11,0.1);color:var(--warn);}
.vs-danger{background:rgba(239,68,68,0.1);color:var(--danger);}
.notes-area{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;padding:0.75rem;outline:none;resize:vertical;min-height:70px;transition:border-color 0.2s;}
.notes-area:focus{border-color:var(--accent);}
.notes-area::placeholder{color:var(--text3);}
.log-actions{display:flex;align-items:center;gap:0.75rem;margin-top:1rem;}
.save-msg{font-size:0.78rem;}

/* HISTORY TABLE */
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.card-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);font-weight:400;}
table{width:100%;border-collapse:collapse;}
th{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);padding:0.5rem 0.75rem;text-align:left;border-bottom:1px solid var(--border);}
td{font-size:0.83rem;color:var(--text2);padding:0.65rem 0.75rem;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.vt-val{font-weight:500;color:var(--text);}
.vt-badge{display:inline-flex;font-size:0.64rem;font-weight:600;text-transform:uppercase;padding:1px 6px;border-radius:6px;}
.vt-ok{background:rgba(0,212,170,0.1);color:var(--accent);}
.vt-warn{background:rgba(245,158,11,0.1);color:var(--warn);}
.vt-bad{background:rgba(239,68,68,0.1);color:var(--danger);}
.no-data{text-align:center;color:var(--text3);padding:1.5rem;font-size:0.85rem;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:500;border:none;border-radius:var(--radius-xs);cursor:pointer;transition:all 0.2s;padding:0.6rem 1.2rem;}
.btn:disabled{opacity:0.55;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#042a1e;}
.btn-primary:hover:not(:disabled){background:var(--accent-dim);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,170,0.3);}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-blue{background:rgba(26,82,153,0.2);color:#74b5f5;border:1px solid rgba(26,82,153,0.3);}
.btn-blue:hover:not(:disabled){background:rgba(26,82,153,0.3);}
.btn-sm{padding:0.4rem 0.85rem;font-size:0.8rem;}
.btn-danger-sm{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);padding:0.35rem 0.75rem;font-size:0.75rem;}

/* SPINNER */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(4,42,30,0.3);border-top-color:#042a1e;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:0.65rem;border-radius:var(--radius-xs);padding:0.75rem 1rem;font-size:0.84rem;line-height:1.5;margin-bottom:1rem;}
.alert-success{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.2);color:var(--accent);}
.alert-danger{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.5s ease both;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:10px;}
.hidden{display:none!important;}
@media(max-width:900px){.sidenav{transform:translateX(-100%);}.sidenav.open{transform:translateX(0);}.main{margin-left:0;}.vitals-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.vitals-grid{grid-template-columns:1fr 1fr;}.pp-grid{grid-template-columns:1fr;}.page-content{padding:1.25rem;}}
</style>
</head>
<body>
<div class="app">

<nav class="sidenav" id="sidenav">
  <div class="sidenav-logo"><div class="pulse-dot"></div>Health<span class="hp">Pulse</span></div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <button class="nav-item active"><span class="nav-icon">🏠</span> Dashboard</button>
    <button class="nav-item" onclick="window.location.href='upload-report.html'"><span class="nav-icon">🔬</span> Lab Reports</button>
    <button class="nav-item" onclick="window.location.href='symptoms.html'"><span class="nav-icon">🩺</span> Symptoms</button>
    <button class="nav-item" onclick="window.location.href='daily-plan.html'"><span class="nav-icon">📅</span> Recovery Plans</button>
  </div>
  <div class="sidenav-foot">
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">D</div>
      <div><div class="user-name" id="userName">Dr. Loading…</div><div class="user-role">Doctor</div></div>
      <button class="logout-btn" onclick="doLogout()" title="Sign out">↩</button>
    </div>
  </div>
</nav>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h2 id="pageGreet">Good morning</h2>
      <p id="pageDate">Loading…</p>
    </div>
    <div class="topbar-right">
      <div class="role-badge">👨‍⚕️ &nbsp;Doctor Dashboard</div>
    </div>
  </header>

  <div class="page-content">

    <!-- LINK NEW PATIENT -->
    <div class="link-bar fade-up">
      <label>+ Link a patient by code:</label>
      <input type="text" id="linkCodeInput" placeholder="e.g. HP3X7K2M" style="max-width:200px;text-transform:uppercase;letter-spacing:.08em"/>
      <button class="btn btn-blue btn-sm" onclick="linkPatient()">Link Patient</button>
      <span class="link-msg" id="linkMsg"></span>
    </div>

    <!-- PATIENT TABS -->
    <div class="patient-tabs-bar fade-up">
      <h3>Patient:</h3>
      <div class="patient-tabs" id="patientTabs">
        <div style="color:var(--text3);font-size:0.85rem">No patients linked yet. Use the field above to link a patient.</div>
      </div>
    </div>

    <!-- PATIENT PROFILE -->
    <div id="patientSection">
      <div class="empty-state fade-up">
        <div class="es-icon">👥</div>
        <div>Select or link a patient above to begin monitoring.</div>
      </div>
    </div>

  </div>
</div>
</div>

<script>
const token = localStorage.getItem('hp_token');
const role  = localStorage.getItem('hp_role');
const name  = localStorage.getItem('hp_name');
if (!token || role !== 'doctor') window.location.href = '/index.html';

if (name) {
  document.getElementById('userName').textContent = 'Dr. ' + name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
}
(function(){
  const h = new Date().getHours();
  document.getElementById('pageGreet').textContent = (h<12?'Good morning':h<17?'Good afternoon':'Good evening') + (name?`, Dr. ${name.split(' ')[0]}`:'');
  document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
})();

let patients = [];
let selectedPatient = null;

// ── Load doctor data (linked patients) ──
async function loadDoctorData() {
  try {
    const res  = await fetch('/api/auth/me', { headers:{ Authorization:'Bearer '+token } });
    const data = await res.json();
    patients = data.linkedPatients || [];
    renderPatientTabs();
    if (patients.length > 0) selectPatient(patients[0]);
  } catch(e) { console.error('Failed to load doctor data:', e); }
}

function renderPatientTabs() {
  const el = document.getElementById('patientTabs');
  if (!patients.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.85rem">No patients linked yet.</div>';
    return;
  }
  el.innerHTML = patients.map((p,i) => {
    const initials = p.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const colors = ['#00c49a','#1a5299','#2d6abf','#7c3aed','#db2777'];
    const col = colors[i % colors.length];
    return `<div class="p-tab ${selectedPatient && selectedPatient._id === p._id ? 'active' : ''}" onclick="selectPatient(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="p-tab-avatar" style="background:${col}22;color:${col}">${initials}</div>
      ${p.name.split(' ')[0]}
    </div>`;
  }).join('');
}

function selectPatient(p) {
  selectedPatient = p;
  renderPatientTabs();
  renderPatientProfile();
  loadVitalsHistory();
}

function renderPatientProfile() {
  const p = selectedPatient;
  if (!p) return;
  const surgery = p.surgeryDate ? new Date(p.surgeryDate) : null;
  const daysSince = surgery ? Math.floor((Date.now()-surgery)/86400000) : 0;
  const total = p.recoveryDays || 14;

  document.getElementById('patientSection').innerHTML = `
    <div class="patient-profile fade-up">
      <div class="pp-grid">
        <div>
          <div class="pp-name">${p.name}</div>
          <div class="pp-meta">
            ${p.surgeryType ? `<span class="pp-tag">🔬 ${p.surgeryType}</span>` : ''}
            ${p.age ? `<span class="pp-tag">🎂 ${p.age} yrs</span>` : ''}
            ${p.gender ? `<span class="pp-tag">👤 ${p.gender}</span>` : ''}
            ${surgery ? `<span class="pp-tag">📅 Surgery: ${surgery.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right">
          <div class="pp-day">Day ${daysSince}</div>
          <div class="pp-day-label">of ${total}-day recovery</div>
        </div>
      </div>
    </div>

    <div class="log-section fade-up" id="logSection">
      <div class="log-header">
        <div>
          <div class="log-title">📋 Log Today's Vitals for ${p.name}</div>
          <div class="log-sub">Data will be instantly visible to the patient and family</div>
        </div>
      </div>
      <div class="vitals-grid">
        <div class="vi-card">
          <div class="vi-label"><span>❤️</span> Heart Rate</div>
          <input type="number" class="vi-input" id="inHR" placeholder="e.g. 78" oninput="liveValidate('HR',this.value)"/>
          <div class="vi-unit">beats per minute (bpm)</div>
          <div class="vi-ref">Normal: 60–100 bpm</div>
          <div class="vi-status" id="stHR"></div>
        </div>
        <div class="vi-card">
          <div class="vi-label"><span>🩸</span> Blood Pressure</div>
          <input type="text" class="vi-input" id="inBP" placeholder="e.g. 120/80" oninput="liveValidate('BP',this.value)"/>
          <div class="vi-unit">mmHg (systolic/diastolic)</div>
          <div class="vi-ref">Normal: &lt;120/80 mmHg</div>
          <div class="vi-status" id="stBP"></div>
        </div>
        <div class="vi-card">
          <div class="vi-label"><span>🫁</span> SpO₂</div>
          <input type="number" class="vi-input" id="inSpO2" placeholder="e.g. 98" oninput="liveValidate('SpO2',this.value)"/>
          <div class="vi-unit">% oxygen saturation</div>
          <div class="vi-ref">Normal: 95–100%</div>
          <div class="vi-status" id="stSpO2"></div>
        </div>
        <div class="vi-card">
          <div class="vi-label"><span>🌡️</span> Temperature</div>
          <input type="number" step="0.1" class="vi-input" id="inTemp" placeholder="e.g. 36.8" oninput="liveValidate('Temp',this.value)"/>
          <div class="vi-unit">°C</div>
          <div class="vi-ref">Normal: 36.1–37.2°C</div>
          <div class="vi-status" id="stTemp"></div>
        </div>
        <div class="vi-card">
          <div class="vi-label"><span>🩺</span> Haemoglobin</div>
          <input type="number" step="0.1" class="vi-input" id="inHb" placeholder="e.g. 13.5" oninput="liveValidate('Hb',this.value)"/>
          <div class="vi-unit">g/dL</div>
          <div class="vi-ref">Normal: M 13.5–17.5 | F 12–15.5</div>
          <div class="vi-status" id="stHb"></div>
        </div>
        <div class="vi-card">
          <div class="vi-label"><span>💉</span> Blood Glucose</div>
          <input type="number" class="vi-input" id="inGlucose" placeholder="e.g. 95" oninput="liveValidate('Glucose',this.value)"/>
          <div class="vi-unit">mg/dL (fasting)</div>
          <div class="vi-ref">Normal fasting: 70–100 mg/dL</div>
          <div class="vi-status" id="stGlucose"></div>
        </div>
      </div>
      <div style="margin-top:0.75rem">
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:0.4rem;">Doctor's Notes (visible to patient &amp; family)</div>
        <textarea class="notes-area" id="inNotes" placeholder="e.g. Recovery is progressing well. Wound site looks clean. Continue medication. Avoid strenuous activity…"></textarea>
      </div>
      <div class="log-actions">
        <button class="btn btn-primary" onclick="saveVitals()" id="saveBtn">💾 Save &amp; Publish Vitals</button>
        <span class="save-msg" id="saveMsg"></span>
      </div>
    </div>

    <div class="card fade-up">
      <div class="card-header">
        <div class="card-title">Vitals History — ${p.name}</div>
      </div>
      <table>
        <thead>
          <tr><th>Date &amp; Time</th><th>Heart Rate</th><th>BP</th><th>SpO₂</th><th>Temp</th><th>Haemoglobin</th><th>Notes</th></tr>
        </thead>
        <tbody id="historyBody"><tr><td colspan="7" class="no-data">Loading…</td></tr></tbody>
      </table>
    </div>
  `;
}

async function saveVitals() {
  if (!selectedPatient) return;
  const hr      = document.getElementById('inHR')?.value;
  const bp      = document.getElementById('inBP')?.value;
  const spo2    = document.getElementById('inSpO2')?.value;
  const temp    = document.getElementById('inTemp')?.value;
  const hb      = document.getElementById('inHb')?.value;
  const glucose = document.getElementById('inGlucose')?.value;
  const notes   = document.getElementById('inNotes')?.value;
  const msg     = document.getElementById('saveMsg');

  if (!hr && !bp && !spo2 && !temp) {
    msg.style.color='var(--danger)'; msg.textContent='⚠️ Enter at least one vital.'; return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving…';

  try {
    const res = await fetch('/api/health/log', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({
        patientId:    selectedPatient._id,
        heartRate:    hr    ? parseFloat(hr)    : null,
        bloodPressure:bp    || null,
        oxygenLevel:  spo2  ? parseFloat(spo2)  : null,
        temperature:  temp  ? parseFloat(temp)  : null,
        haemoglobin:  hb    ? parseFloat(hb)    : null,
        bloodGlucose: glucose ? parseFloat(glucose) : null,
        notes: notes || ''
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Save failed');
    msg.style.color='var(--accent)'; msg.textContent='✓ Vitals saved and published!';
    // Clear inputs
    ['inHR','inBP','inSpO2','inTemp','inHb','inGlucose','inNotes'].forEach(id => {
      const el = document.getElementById(id); if(el) el.value='';
    });
    ['stHR','stBP','stSpO2','stTemp','stHb','stGlucose'].forEach(id=>{
      const el=document.getElementById(id); if(el){el.textContent='';el.className='vi-status';}
    });
    setTimeout(()=>msg.textContent='', 4000);
    loadVitalsHistory();
  } catch(e) {
    msg.style.color='var(--danger)'; msg.textContent='⚠️ '+e.message;
  } finally {
    btn.disabled=false; btn.innerHTML='💾 Save &amp; Publish Vitals';
  }
}

async function loadVitalsHistory() {
  if (!selectedPatient) return;
  const tbody = document.getElementById('historyBody');
  if (!tbody) return;
  try {
    const res  = await fetch(`/api/health/history?patientId=${selectedPatient._id}&limit=15`, { headers:{'Authorization':'Bearer '+token} });
    const logs = await res.json();
    if (!logs.length) { tbody.innerHTML='<tr><td colspan="7" class="no-data">No vitals logged yet for this patient.</td></tr>'; return; }

    tbody.innerHTML = logs.map(log => {
      const d = new Date(log.createdAt);
      const dateStr = d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const getStatus = (val, low, high) => !val ? '' : val < low ? 'vt-warn' : val > high ? 'vt-bad' : 'vt-ok';
      const hrClass   = getStatus(log.heartRate, 60, 100);
      const spo2Class = getStatus(log.oxygenLevel, 95, 100);
      const tempClass = getStatus(log.temperature, 36.1, 37.2);
      return `<tr>
        <td>${dateStr}</td>
        <td class="vt-val">${log.heartRate || '—'} ${log.heartRate?'<span class="vt-badge '+hrClass+'">bpm</span>':''}</td>
        <td class="vt-val">${log.bloodPressure || '—'}</td>
        <td class="vt-val">${log.oxygenLevel ? log.oxygenLevel+'%' : '—'} ${log.oxygenLevel?'<span class="vt-badge '+spo2Class+'">SpO₂</span>':''}</td>
        <td class="vt-val">${log.temperature ? log.temperature+'°C' : '—'} ${log.temperature?'<span class="vt-badge '+tempClass+'">temp</span>':''}</td>
        <td class="vt-val">${log.haemoglobin ? log.haemoglobin+' g/dL' : '—'}</td>
        <td style="max-width:160px;white-space:normal;font-size:0.78rem;color:var(--text2)">${log.notes || '—'}</td>
      </tr>`;
    }).join('');
  } catch(e) { if(tbody) tbody.innerHTML='<tr><td colspan="7" class="no-data">Could not load history.</td></tr>'; }
}

// ── Live validation ──
const RANGES = {
  HR:      {low:40, wLow:60,  wHigh:100, high:180},
  SpO2:    {low:80, wLow:95,  wHigh:100, high:100},
  Temp:    {low:34, wLow:36.1,wHigh:37.2,high:41},
  Hb:      {low:6,  wLow:11,  wHigh:17.5,high:22},
  Glucose: {low:40, wLow:70,  wHigh:100, high:400},
};
function liveValidate(key, val) {
  const el = document.getElementById('st'+key);
  if (!el) return;
  if (!val) { el.textContent=''; el.className='vi-status'; return; }
  if (key==='BP') {
    const parts=val.split('/');
    if(parts.length===2){const s=parseInt(parts[0]),d=parseInt(parts[1]);
      if(isNaN(s)||isNaN(d))return;
      if(s<120&&d<80) setS(el,'Normal','vs-normal');
      else if(s<130)  setS(el,'Elevated','vs-warn');
      else            setS(el,'High ⚠','vs-danger');}
    return;
  }
  const v=parseFloat(val),r=RANGES[key];if(!r)return;
  if(v<r.wLow||v>r.wHigh) setS(el,v<r.low||v>r.high?'Critical ⚠':'Abnormal','vs-warn');
  else setS(el,'Normal ✓','vs-normal');
}
function setS(el,txt,cls){el.textContent=txt;el.className='vi-status '+cls;}

// ── Link patient ──
async function linkPatient() {
  const code = document.getElementById('linkCodeInput').value.trim().toUpperCase();
  const msg  = document.getElementById('linkMsg');
  if (!code) { msg.style.color='var(--danger)'; msg.textContent='Enter a code.'; return; }
  try {
    const res  = await fetch('/api/auth/link-patient', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ patientCode: code })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    msg.style.color='var(--accent)'; msg.textContent='✓ '+data.message;
    document.getElementById('linkCodeInput').value='';
    await loadDoctorData();
    setTimeout(()=>msg.textContent='',4000);
  } catch(e) { msg.style.color='var(--danger)'; msg.textContent='⚠️ '+e.message; }
}

function doLogout() {
  ['hp_token','hp_role','hp_name'].forEach(k=>localStorage.removeItem(k));
  window.location.href='/index.html';
}

loadDoctorData();
</script>
