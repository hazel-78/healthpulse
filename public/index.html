<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPulse | Secure Login</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-branding">
                <h1>HealthPulse</h1>
                <p>Secure, intelligent health monitoring and record management for patients and healthcare providers.</p>
            </div>
            
            <div class="auth-form-wrapper">
                <h2>Welcome Back</h2>
                <p>Please enter your credentials to access your dashboard.</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <!-- Role selection removed! The backend will identify the role based on the email. -->

                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <div class="auth-links">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
